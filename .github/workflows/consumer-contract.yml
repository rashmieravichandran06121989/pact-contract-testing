name: Consumer — Generate & Publish Pact

# ---------------------------------------------------------------------------
# When to run
# ---------------------------------------------------------------------------
on:
  push:
    branches: [main, develop]
    paths:
      - 'consumer/**'
      - '.github/workflows/consumer-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'consumer/**'

# ---------------------------------------------------------------------------
# Prevent overlapping runs on the same branch
# ---------------------------------------------------------------------------
concurrency:
  group: consumer-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -------------------------------------------------------------------------
  # 1. Generate the pact contract by running consumer tests
  # -------------------------------------------------------------------------
  consumer-pact-tests:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Run consumer pact tests (generates pact files)
        working-directory: consumer
        run: npm test
        env:
          CI: 'true'

      - name: Upload generated pact files as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
          retention-days: 7

  # -------------------------------------------------------------------------
  # 2. Publish contracts to the Pact Broker (main branch only)
  # -------------------------------------------------------------------------
  publish-pacts:
    name: Publish Pacts to Broker
    runs-on: ubuntu-latest
    needs: consumer-pact-tests
    # Only publish when merging to main — not on every PR
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Download pact files from previous job
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Publish pacts to Pact Broker
        working-directory: consumer
        run: npm run publish:pacts
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  # -------------------------------------------------------------------------
  # 3. Can-I-Deploy check — ensure consumer is safe to go live
  # -------------------------------------------------------------------------
  can-i-deploy-consumer:
    name: Can I Deploy? (Consumer)
    runs-on: ubuntu-latest
    needs: publish-pacts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: Check can-i-deploy
        run: |
          pact-broker can-i-deploy \
            --pacticipant OrderService \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url ${{ secrets.PACT_BROKER_BASE_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}
