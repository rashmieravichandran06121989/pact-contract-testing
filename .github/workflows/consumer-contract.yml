name: Consumer — Generate & Publish Pact

on:
  push:
    branches: [main, develop]
    paths:
      - 'consumer/**'
      - '.github/workflows/consumer-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'consumer/**'

concurrency:
  group: consumer-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer-pact-tests:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Run consumer pact tests
        working-directory: consumer
        run: npm test
        env:
          CI: 'true'

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
          retention-days: 7

  publish-pacts:
    name: Publish Pacts to Broker
    runs-on: ubuntu-latest
    needs: consumer-pact-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    env:
      HAS_BROKER: ${{ secrets.PACT_BROKER_BASE_URL != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Publish pacts to broker
        if: env.HAS_BROKER == 'true'
        working-directory: consumer
        run: npm run publish:pacts
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

      - name: Skip publish — no broker configured
        if: env.HAS_BROKER != 'true'
        run: echo "No broker configured — skipping publish"

  can-i-deploy:
    name: Can I Deploy? (Consumer)
    runs-on: ubuntu-latest
    needs: publish-pacts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Skip — no broker configured
        run: echo "No broker configured — skipping can-i-deploy"
