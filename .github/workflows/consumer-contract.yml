name: Consumer — Generate & Publish Pact

on:
  push:
    branches: [main, develop]
    paths:
      - 'consumer/**'
      - '.github/workflows/consumer-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'consumer/**'

concurrency:
  group: consumer-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer-pact-tests:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Run consumer pact tests
        working-directory: consumer
        run: npm test
        env:
          CI: 'true'

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
          retention-days: 7
