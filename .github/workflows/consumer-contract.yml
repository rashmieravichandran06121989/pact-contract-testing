name: Consumer — Generate & Publish Pact

on:
  push:
    branches: [main, develop]
    paths:
      - 'consumer/**'
      - '.github/workflows/consumer-contract.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'consumer/**'

concurrency:
  group: consumer-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  consumer-pact-tests:
    name: Consumer Pact Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Run consumer pact tests
        working-directory: consumer
        run: npm test
        env:
          CI: 'true'

      - name: Upload pact files
        uses: actions/upload-artifact@v4
        with:
          name: pact-contracts
          path: pacts/
          retention-days: 7

  publish-pacts:
    name: Publish Pacts to Broker
    runs-on: ubuntu-latest
    needs: consumer-pact-tests
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: consumer/package-lock.json

      - name: Install dependencies
        working-directory: consumer
        run: npm ci

      - name: Download pact files
        uses: actions/download-artifact@v4
        with:
          name: pact-contracts
          path: pacts/

      - name: Publish pacts to broker
        run: |
          if [ -z "${{ secrets.PACT_BROKER_BASE_URL }}" ]; then
            echo "No broker configured — skipping publish"
            exit 0
          fi
          cd consumer && npm run publish:pacts
        env:
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  can-i-deploy:
    name: Can I Deploy? (Consumer)
    runs-on: ubuntu-latest
    needs: publish-pacts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Skip if no broker configured
        run: |
          if [ -z "${{ secrets.PACT_BROKER_BASE_URL }}" ]; then
            echo "No broker configured — skipping can-i-deploy"
            exit 0
          fi
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH
          pact-broker can-i-deploy \
            --pacticipant OrderService \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url ${{ secrets.PACT_BROKER_BASE_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}
