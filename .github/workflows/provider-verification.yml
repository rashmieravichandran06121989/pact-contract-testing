name: Provider — Verify Pact Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - 'provider/**'
      - '.github/workflows/provider-verification.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'provider/**'
  repository_dispatch:
    types: [pact-contract-requiring-verification-published]

concurrency:
  group: provider-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provider-pact-verification:
    name: Provider Pact Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install consumer dependencies
        working-directory: consumer
        run: npm ci

      - name: Generate pact file (run consumer tests)
        working-directory: consumer
        run: npm test

      - name: Install provider dependencies
        working-directory: provider
        run: npm ci

      - name: Run provider pact verification
        working-directory: provider
        run: npm test
        env:
          CI: 'true'
          PACT_SOURCE: local
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  can-i-deploy-provider:
    name: Can I Deploy? (Provider)
    runs-on: ubuntu-latest
    needs: provider-
