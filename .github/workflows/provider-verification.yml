name: Provider — Verify Pact Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - 'provider/**'
      - '.github/workflows/provider-verification.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'provider/**'
  repository_dispatch:
    types: [pact-contract-requiring-verification-published]

concurrency:
  group: provider-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  provider-pact-verification:
    name: Provider Pact Verification
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: provider/package-lock.json

      - name: Install dependencies
        working-directory: provider
        run: npm ci

      - name: Run provider pact verification
        working-directory: provider
        run: npm test
        env:
          CI: 'true'
          PACT_BROKER_BASE_URL: ${{ secrets.PACT_BROKER_BASE_URL }}
          PACT_BROKER_TOKEN: ${{ secrets.PACT_BROKER_TOKEN }}
          PACT_SOURCE: ${{ secrets.PACT_BROKER_BASE_URL != '' && 'broker' || 'local' }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  can-i-deploy-provider:
    name: Can I Deploy? (Provider)
    runs-on: ubuntu-latest
    needs: provider-pact-verification
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && secrets.PACT_BROKER_BASE_URL != ''
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: Check can-i-deploy
        run: |
          pact-broker can-i-deploy \
            --pacticipant UserService \
            --version ${{ github.sha }} \
            --to-environment production \
            --broker-base-url ${{ secrets.PACT_BROKER_BASE_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}

  record-deployment:
    name: Record Deployment
    runs-on: ubuntu-latest
    needs: can-i-deploy-provider
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Install Pact CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/pact-foundation/pact-ruby-standalone/master/install.sh | bash
          echo "$HOME/.pact/bin" >> $GITHUB_PATH

      - name: Record deployment to production
        run: |
          pact-broker record-deployment \
            --pacticipant UserService \
            --version ${{ github.sha }} \
            --environment production \
            --broker-base-url ${{ secrets.PACT_BROKER_BASE_URL }} \
            --broker-token ${{ secrets.PACT_BROKER_TOKEN }}
