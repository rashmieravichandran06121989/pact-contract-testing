name: Provider — Verify Pact Contracts

on:
  push:
    branches: [main, develop]
    paths:
      - 'provider/**'
      - '.github/workflows/provider-verification.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'provider/**'
  repository_dispatch:
    types: [pact-contract-requiring-verification-published]

concurrency:
  group: provider-pact-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Provider Pact Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install consumer dependencies
        working-directory: consumer
        run: npm ci

      - name: Generate pact file
        working-directory: consumer
        run: npm test

      - name: Install provider dependencies
        working-directory: provider
        run: npm ci

      - name: Verify provider against contract
        working-directory: provider
        run: npm test
        env:
          CI: 'true'
          PACT_SOURCE: local
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}

  can-i-deploy:
    name: Can I Deploy? (Provider)
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Skip if no broker configured
        run: |
          if [ -z "${{ secrets.PACT_BROKER_BASE_URL }}" ]; then
            echo "No broker configured — skipping"
            exit 0
          fi

  record-deployment:
    name: Record Deployment
    runs-on: ubuntu-latest
    needs: can-i-deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Skip if no broker configured
        run: |
          if [ -z "${{ secrets.PACT_BROKER_BASE_URL }}" ]; then
            echo "No broker configured — skipping"
            exit 0
          fi
